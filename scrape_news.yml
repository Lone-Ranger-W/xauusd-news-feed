# .github/workflows/scrape_news.yml
#
# Runs the ForexFactory news scraper every Sunday at 20:00 UTC and commits
# the updated JSON to the `data` branch so the XAUUSD cBot can fetch it.
#
# Manual trigger:  Actions → "Scrape XAUUSD News Calendar" → Run workflow

name: Scrape XAUUSD News Calendar

on:
  schedule:
    # Every Sunday at 20:00 UTC (after weekend market close, before Monday open)
    - cron: "0 20 * * 0"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write      # needed to commit back to the data branch

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Check out main — this is where scrape_news.py lives
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0       # full history needed to push to data branch later

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install requests

      # 4. Run the scraper — outputs to data/news_events.json in working tree
      - name: Run scraper
        run: python scrape_news.py

      # 5. Switch to data branch and commit the fresh JSON
      - name: Commit and push to data branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stash the generated JSON so we can carry it across the branch switch
          git stash -- data/news_events.json

          # Switch to data branch
          git fetch origin data
          git checkout data

          # Restore the generated file from stash
          git stash pop

          # Commit only if the file changed
          git add data/news_events.json
          if git diff --cached --quiet; then
            echo "No changes to news_events.json — nothing to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: update news_events.json [${TIMESTAMP}]"
            git push origin data
            echo "Successfully pushed updated news_events.json to data branch."
          fi
